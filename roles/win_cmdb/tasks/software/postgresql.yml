---
- name: "PostgreSQL | query Windows services (postgresql-*)"
  ansible.windows.win_shell: |
    Get-Service -Name 'postgresql*' -ErrorAction SilentlyContinue |
      Where-Object { $_.Status -eq 'Running' } |
      Select-Object -First 1 -ExpandProperty Name
  register: win_pg_service
  changed_when: false
  failed_when: false

- name: "PostgreSQL | get psql version"
  ansible.windows.win_command: psql --version
  register: win_pg_version
  changed_when: false
  failed_when: false

- name: "PostgreSQL | locate psql.exe binary"
  ansible.windows.win_shell: (Get-Command psql -ErrorAction SilentlyContinue).Source
  register: win_pg_path
  changed_when: false
  failed_when: false

- name: "PostgreSQL | query installed package (Uninstall registry)"
  ansible.windows.win_shell: |
    $paths = @(
      'HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Uninstall\*',
      'HKLM:\SOFTWARE\WOW6432Node\Microsoft\Windows\CurrentVersion\Uninstall\*'
    )
    Get-ItemProperty $paths -ErrorAction SilentlyContinue |
      Where-Object { $_.DisplayName -match 'PostgreSQL' } |
      Select-Object -First 1 -ExpandProperty DisplayName
  register: win_pg_package
  changed_when: false
  failed_when: false

- name: "PostgreSQL | append normalized record to cmdb_software_results"
  ansible.builtin.set_fact:
    cmdb_software_results: "{{ cmdb_software_results + [win_pg_entry] }}"
  vars:
    win_pg_service_active: "{{ (win_pg_service.stdout | default('') | trim) | length > 0 }}"
    win_pg_binary_found: "{{ (win_pg_path.stdout | default('') | trim) | length > 0 }}"
    win_pg_status: >-
      {{ 'running' if win_pg_service_active
         else ('installed' if win_pg_binary_found
         else 'not_installed') }}
    win_pg_entry:
      hostname: "{{ inventory_hostname }}"
      software: "PostgreSQL"
      status: "{{ win_pg_status | trim }}"
      version: "{{ win_pg_version.stdout | default('') | trim }}"
      install_folder: "{{ win_pg_path.stdout | default('') | trim }}"
      package: "{{ win_pg_package.stdout | default('') | trim }}"
      platform: "windows"
