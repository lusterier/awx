---
- name: "Docker | query Windows service state"
  ansible.windows.win_service_info:
    name: docker
  register: win_docker_service
  failed_when: false

- name: "Docker | get docker.exe version"
  ansible.windows.win_command: docker --version
  register: win_docker_version
  changed_when: false
  failed_when: false

- name: "Docker | locate docker.exe binary"
  ansible.windows.win_shell: (Get-Command docker -ErrorAction SilentlyContinue).Source
  register: win_docker_path
  changed_when: false
  failed_when: false

- name: "Docker | query installed package (Uninstall registry)"
  ansible.windows.win_shell: |
    $paths = @(
      'HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Uninstall\*',
      'HKLM:\SOFTWARE\WOW6432Node\Microsoft\Windows\CurrentVersion\Uninstall\*'
    )
    Get-ItemProperty $paths -ErrorAction SilentlyContinue |
      Where-Object { $_.DisplayName -match 'Docker' } |
      Select-Object -First 1 -ExpandProperty DisplayName
  register: win_docker_package
  changed_when: false
  failed_when: false

- name: "Docker | append normalized record to cmdb_software_results"
  ansible.builtin.set_fact:
    cmdb_software_results: "{{ cmdb_software_results + [win_docker_entry] }}"
  vars:
    win_docker_service_list: "{{ win_docker_service.services | default([]) }}"
    win_docker_service_state: "{{ (win_docker_service_list | first).state | default('') if win_docker_service_list | length > 0 else '' }}"
    win_docker_binary_found: "{{ (win_docker_path.stdout | default('') | trim) | length > 0 }}"
    win_docker_status: >-
      {{ 'running' if win_docker_service_state == 'running'
         else ('installed' if win_docker_binary_found
         else 'not_installed') }}
    win_docker_entry:
      hostname: "{{ inventory_hostname }}"
      software: "Docker"
      status: "{{ win_docker_status | trim }}"
      version: "{{ win_docker_version.stdout | default('') | trim }}"
      install_folder: "{{ win_docker_path.stdout | default('') | trim }}"
      package: "{{ win_docker_package.stdout | default('') | trim }}"
      platform: "windows"
