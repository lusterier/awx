---
- name: "PostgreSQL | check AIX subsystem status (lssrc)"
  ansible.builtin.shell: |
    lssrc -s postgresql 2>/dev/null | tail -n +2 | head -n 1
  args:
    executable: /bin/sh
  register: aix_pg_subsys
  changed_when: false
  failed_when: false

- name: "PostgreSQL | get psql version"
  ansible.builtin.command: psql --version
  register: aix_pg_version
  changed_when: false
  failed_when: false

- name: "PostgreSQL | locate psql binary"
  ansible.builtin.command: which psql
  register: aix_pg_path
  changed_when: false
  failed_when: false

- name: "PostgreSQL | query installed AIX fileset (lslpp)"
  ansible.builtin.shell: |
    lslpp -L 2>/dev/null | grep -iE 'postgres|psql' | head -n 1
  args:
    executable: /bin/sh
  register: aix_pg_package
  changed_when: false
  failed_when: false

- name: "PostgreSQL | append normalized record to cmdb_software_results"
  ansible.builtin.set_fact:
    cmdb_software_results: "{{ cmdb_software_results + [aix_pg_entry] }}"
  vars:
    aix_pg_binary_found: "{{ (aix_pg_path.rc | default(1)) == 0 and (aix_pg_path.stdout | default('') | trim) | length > 0 }}"
    aix_pg_active: "{{ 'active' in (aix_pg_subsys.stdout | default('') | lower) }}"
    aix_pg_status: >-
      {{ 'running' if aix_pg_active
         else ('installed' if aix_pg_binary_found
         else 'not_installed') }}
    aix_pg_entry:
      hostname: "{{ inventory_hostname }}"
      software: "PostgreSQL"
      status: "{{ aix_pg_status | trim }}"
      version: "{{ aix_pg_version.stdout | default('') | trim }}"
      install_folder: "{{ aix_pg_path.stdout | default('') | trim }}"
      package: "{{ aix_pg_package.stdout | default('') | trim }}"
      platform: "aix"
