---
- name: "Zabbix Agent | check AIX subsystem status (lssrc)"
  ansible.builtin.shell: |
    lssrc -s zabbix_agentd 2>/dev/null | tail -n +2 | head -n 1
  args:
    executable: /bin/sh
  register: aix_zbx_subsys
  changed_when: false
  failed_when: false

- name: "Zabbix Agent | get agent version (agent2 then agentd)"
  ansible.builtin.shell: |
    if command -v zabbix_agent2 >/dev/null 2>&1; then
      zabbix_agent2 -V 2>/dev/null | head -n 1
    elif command -v zabbix_agentd >/dev/null 2>&1; then
      zabbix_agentd -V 2>/dev/null | head -n 1
    fi
  args:
    executable: /bin/sh
  register: aix_zbx_version
  changed_when: false
  failed_when: false

- name: "Zabbix Agent | locate agent binary"
  ansible.builtin.shell: |
    which zabbix_agent2 2>/dev/null || which zabbix_agentd 2>/dev/null
  args:
    executable: /bin/sh
  register: aix_zbx_path
  changed_when: false
  failed_when: false

- name: "Zabbix Agent | query installed AIX fileset (lslpp)"
  ansible.builtin.shell: |
    lslpp -L 2>/dev/null | grep -i zabbix | head -n 1
  args:
    executable: /bin/sh
  register: aix_zbx_package
  changed_when: false
  failed_when: false

- name: "Zabbix Agent | append normalized record to cmdb_software_results"
  ansible.builtin.set_fact:
    cmdb_software_results: "{{ cmdb_software_results + [aix_zbx_entry] }}"
  vars:
    aix_zbx_binary_found: "{{ (aix_zbx_path.rc | default(1)) == 0 and (aix_zbx_path.stdout | default('') | trim) | length > 0 }}"
    aix_zbx_active: "{{ 'active' in (aix_zbx_subsys.stdout | default('') | lower) }}"
    aix_zbx_status: >-
      {{ 'running' if aix_zbx_active
         else ('installed' if aix_zbx_binary_found
         else 'not_installed') }}
    aix_zbx_entry:
      hostname: "{{ inventory_hostname }}"
      software: "Zabbix Agent"
      status: "{{ aix_zbx_status | trim }}"
      version: "{{ aix_zbx_version.stdout | default('') | trim }}"
      install_folder: "{{ aix_zbx_path.stdout | default('') | trim }}"
      package: "{{ aix_zbx_package.stdout | default('') | trim }}"
      platform: "aix"
