---
# Per-software collectors to run on RHEL hosts.
# Add new software by:
#   1. creating roles/rhel_cmdb/tasks/software/<name>.yml
#   2. appending its name here (or via AWX extra vars / survey).
cmdb_rhel_software_modules:
  - docker

# Per-host results buffer (reset in tasks/main.yml).
cmdb_software_results: []

# Optional per-host JSON artifact. Written under AWX_PRIVATE_DATA_DIR so it
# stays inside the job's writable workspace. Disabled by default to keep
# set_stats as the canonical output channel.
cmdb_write_json: false
cmdb_output_dir: "{{ lookup('env', 'AWX_PRIVATE_DATA_DIR') | default('/tmp', true) }}"
