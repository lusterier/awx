---
- name: "Docker | check service is-active"
  ansible.builtin.command: systemctl is-active docker
  register: ol_docker_service
  changed_when: false
  failed_when: false

- name: "Docker | get version"
  ansible.builtin.command: docker --version
  register: ol_docker_version
  changed_when: false
  failed_when: false

- name: "Docker | locate binary"
  ansible.builtin.command: command -v docker
  register: ol_docker_path
  changed_when: false
  failed_when: false

- name: "Docker | get rpm package name"
  ansible.builtin.shell: |
    set -o pipefail
    rpm -qa | grep -i docker | head -n 1
  args:
    executable: /bin/bash
  register: ol_docker_package
  changed_when: false
  failed_when: false

- name: "Docker | append normalized record to cmdb_software_results"
  ansible.builtin.set_fact:
    cmdb_software_results: "{{ cmdb_software_results + [ol_docker_entry] }}"
  vars:
    ol_docker_binary_found: "{{ (ol_docker_path.rc | default(1)) == 0 and (ol_docker_path.stdout | default('') | trim) | length > 0 }}"
    ol_docker_service_active: "{{ (ol_docker_service.stdout | default('') | trim) == 'active' }}"
    ol_docker_status: >-
      {{ 'running' if ol_docker_service_active
         else ('installed' if ol_docker_binary_found
         else 'not_installed') }}
    ol_docker_entry:
      hostname: "{{ inventory_hostname }}"
      software: "Docker"
      status: "{{ ol_docker_status | trim }}"
      version: "{{ ol_docker_version.stdout | default('') | trim }}"
      install_folder: "{{ ol_docker_path.stdout | default('') | trim }}"
      package: "{{ ol_docker_package.stdout | default('') | trim }}"
      platform: "oracle_linux"
